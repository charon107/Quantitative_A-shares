name: Daily Stock Data Update

on:
  schedule:
    - cron: "0 11 * * 1-5"  # UTC 11:00 = CST 19:00 工作日收盘后
  workflow_dispatch:  # 手动触发，用于测试

# 同一时间只跑一个：新触发会取消仍在跑的旧运行，避免定时+手动相互堆积
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 覆盖冷启动全量拉取场景（~80分钟）

    # 关闭 HF 的 Xet 传输后端：1.20 的 xet 在 CI 拉大量小文件时会卡死，
    # 关掉后回退到稳定的 https 下载/上传（download 与 upload 步骤都生效）。
    env:
      HF_HUB_DISABLE_XET: "1"
      # tushare 并行抓取进程数：真正的限速由 tushare_client 的跨进程全局节流器
      # 保证（见 TUSHARE_MAX_CALLS_PER_MIN），不会因为加 worker 而超过账号限频
      TUSHARE_WORKERS: "8"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Download existing data from HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run python -m src.data_collection.hf_sync download

      - name: Run incremental stock data update
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          # 第三方代理网关地址（如果 token 是 tushare 官方直发，留空这个 secret 即可）
          TUSHARE_API_URL: ${{ secrets.TUSHARE_API_URL }}
        run: uv run python src/data_collection/stock_price.py

      - name: Upload updated data to HF
        if: always()  # 即使上一步报错也尽量上传已更新部分
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run python -m src.data_collection.hf_sync upload
