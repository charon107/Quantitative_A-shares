name: 每日入库 DuckDB

# Tushare A股日线在收盘后约 15:00-16:00（北京时间）入库。
# 这里在北京 17:17 触发，19:17 兜底；脚本幂等（只在拿到新数据时推进），
# 节假日自动跳过（无新交易日则直接退出）。
on:
  schedule:
    - cron: "17 9 * * 1-5"   # 17:17 北京（UTC 09:17，工作日）
    - cron: "17 11 * * 1-5"  # 19:17 北京（兜底）
  workflow_dispatch: {}       # 支持手动触发

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: SSH 触发服务器入库（tushare -> DuckDB -> 清/预热 Redis）
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 25m
          script: |
            set -e
            cd /root/Quantitative_A-shares/WechatNum
            bash deploy/refresh_data.sh
