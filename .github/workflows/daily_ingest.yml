name: 每日入库 DuckDB

# 数据全部由 GitHub Actions runner（境外，直连 tushare 代理稳定）抓取成 parquet，
# scp 到服务器后，服务器只做 DB 活（重算前复权、入库、原子替换、清/预热 Redis），
# 全程不在服务器侧调用网关——绕开「服务器 -> 网关」网络不通的问题。
#
# Tushare A股日线收盘后约 15:00-16:00（北京时间）入库。北京 17:17 触发，19:17 兜底；
# 幂等（INSERT OR REPLACE + 只对有新交易日的 code 重算前复权），节假日无新交易日自然无更新。
on:
  schedule:
    - cron: "17 9 * * 1-5"   # 17:17 北京（UTC 09:17，工作日）
    - cron: "17 11 * * 1-5"  # 19:17 北京（兜底）
  workflow_dispatch: {}

concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: runner 抓取全部数据 -> parquet
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TUSHARE_API_URL: ${{ secrets.TUSHARE_API_URL }}
        run: |
          uv run --no-project --with tushare --with pandas --with pyarrow --with numpy \
            python scripts/fetch_all_parquet.py --outdir artifacts --days 3

      - name: 传 parquet 到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "artifacts/*"
          target: "/tmp/ingest/"
          strip_components: 1

      - name: 服务器加载入库 + 清/预热 Redis
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 25m
          script: |
            set -e
            cd /root/Quantitative_A-shares/WechatNum
            export PATH="/root/.local/bin:$PATH"
            export DUCKDB_PATH=/root/Quantitative_A-shares/WechatNum/market.duckdb
            export INGEST_STATE_PATH=/root/Quantitative_A-shares/WechatNum/ingest_state.json
            uv run python scripts/load_all_parquet.py /tmp/ingest
            uv run python deploy/warmup_redis.py || true
            rm -rf /tmp/ingest
