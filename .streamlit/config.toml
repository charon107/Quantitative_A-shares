# A股股价看板 — 深色终端主题
# 颜色 token 与 src/visualization/ui_theme.py 的 COLORS 保持一致（单一来源见 DESIGN.md）
[theme]
base = "dark"
primaryColor = "#22C55E"            # 主色/上涨绿
backgroundColor = "#020617"         # 近黑背景（OLED）
secondaryBackgroundColor = "#0F172A" # 面板/卡片/侧边栏
textColor = "#F8FAFC"               # 主文本
font = "sans serif"

[server]
# 看板为只读展示，关闭文件监听的无谓重跑
runOnSave = false
